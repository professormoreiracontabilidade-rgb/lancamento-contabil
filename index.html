<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum de Figurinhas Contábeis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a8a);min-height:100vh;color:#111;display:flex;align-items:center;justify-content:center;padding:14px}
.app{width:100%;max-width:430px;height:94vh;background:#f8fafc;border-radius:26px;box-shadow:0 20px 50px rgba(0,0,0,.35);overflow:hidden;display:flex;flex-direction:column;border:4px solid #facc15}
.header{background:#0f172a;color:white;text-align:center;padding:14px 10px;border-bottom:4px solid #facc15}
.header h1{font-size:21px;line-height:1.2;color:#facc15}.header p{font-size:13px;margin-top:4px;color:#dbeafe}
.progress{padding:9px 15px;background:#e0f2fe;font-weight:bold;color:#0f172a;text-align:center;font-size:15px}
.screen{flex:1;display:flex;align-items:center;justify-content:center;padding:15px;overflow:hidden}
.sticker{width:100%;height:100%;background:white;border-radius:24px;border:5px solid #1d4ed8;box-shadow:inset 0 0 0 4px #bfdbfe,0 10px 25px rgba(0,0,0,.15);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:14px;text-align:center;position:relative}
.badge{position:absolute;top:12px;right:12px;background:#facc15;color:#111827;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900;border:2px solid #111827}
.icon{font-size:78px;margin-top:10px;filter:drop-shadow(0 6px 4px rgba(0,0,0,.2))}
.title{font-size:25px;font-weight:900;color:#1e3a8a;line-height:1.1;text-transform:uppercase;margin-top:4px}
.fact{background:#fef3c7;border:2px dashed #b45309;border-radius:16px;padding:10px;font-size:17px;font-weight:800;color:#78350f;width:100%;line-height:1.25}
.rule{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}.box{border-radius:14px;padding:10px;font-weight:900;font-size:16px;min-height:78px;display:flex;flex-direction:column;justify-content:center}.debit{background:#dcfce7;border:3px solid #16a34a;color:#14532d}.credit{background:#fee2e2;border:3px solid #dc2626;color:#7f1d1d}.box span{font-size:13px;margin-bottom:4px;color:#111827}
.launch{background:#eff6ff;border-left:7px solid #2563eb;border-radius:14px;padding:10px;width:100%;font-size:18px;font-weight:900;text-align:left;line-height:1.35;color:#0f172a}
.macete{background:#ecfdf5;border:2px solid #22c55e;border-radius:14px;padding:9px;width:100%;font-size:15px;font-weight:800;color:#064e3b;line-height:1.25}
.nav{display:flex;gap:8px;padding:10px;background:#0f172a}.nav button{flex:1;border:none;border-radius:14px;padding:13px 8px;font-size:16px;font-weight:900;cursor:pointer;color:white;background:#2563eb}.nav button:nth-child(2){background:#16a34a}.nav button:nth-child(3){background:#dc2626}.nav button:active{transform:scale(.98)}
.footer{background:#020617;color:#f8fafc;text-align:center;padding:8px;font-size:12px;font-weight:bold}
@media(max-height:690px){.icon{font-size:58px}.title{font-size:21px}.fact{font-size:15px}.launch{font-size:16px}.macete{font-size:13px}.box{font-size:14px;min-height:64px}.header h1{font-size:18px}}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>ÁLBUM DE FIGURINHAS CONTÁBEIS</h1><p>Uma figurinha por tela • Débito e Crédito</p></div>
  <div class="progress" id="progress"></div>
  <main class="screen"><section class="sticker" id="sticker"></section></main>
  <div class="nav"><button onclick="prev()">⬅️ Voltar</button><button onclick="next()">Próxima ➡️</button><button onclick="restart()">🔄 Reiniciar</button></div>
  <div class="footer">Curso de Contabilidade Professor Moreira • WhatsApp (61) 98532-3574</div>
</div>
<script>
const cards=[
{icon:'💰',title:'Entrada de Dinheiro',fact:'Recebimento de cliente em dinheiro: R$ 1.000',d:'Caixa',c:'Clientes',launch:'D – Caixa .......... 1.000<br>C – Clientes ...... 1.000',macete:'Entrou dinheiro na empresa? O Caixa aumenta. Caixa aumentando é DÉBITO.'},
{icon:'💸',title:'Saída de Dinheiro',fact:'Pagamento de fornecedor em dinheiro: R$ 800',d:'Fornecedores',c:'Caixa',launch:'D – Fornecedores ... 800<br>C – Caixa ............. 800',macete:'Saiu dinheiro da empresa? O Caixa diminui. Caixa diminuindo é CRÉDITO.'},
{icon:'📦',title:'Compra à Vista',fact:'Compra de mercadorias à vista: R$ 2.000',d:'Estoques',c:'Caixa',launch:'D – Estoques ...... 2.000<br>C – Caixa .......... 2.000',macete:'Entrou mercadoria e saiu dinheiro. Estoque aumenta no débito; Caixa diminui no crédito.'},
{icon:'🧾',title:'Compra a Prazo',fact:'Compra de mercadorias a prazo: R$ 3.000',d:'Estoques',c:'Fornecedores',launch:'D – Estoques ........... 3.000<br>C – Fornecedores .... 3.000',macete:'Entrou mercadoria, mas não saiu dinheiro. Nasce uma dívida com fornecedores.'},
{icon:'🏪',title:'Venda à Vista',fact:'Venda de mercadorias à vista: R$ 5.000',d:'Caixa',c:'Receita de Vendas',launch:'D – Caixa ..................... 5.000<br>C – Receita de Vendas ... 5.000',macete:'Entrou dinheiro e nasceu receita. Caixa no débito; Receita no crédito.'},
{icon:'🤝',title:'Venda a Prazo',fact:'Venda de mercadorias a prazo: R$ 4.500',d:'Clientes',c:'Receita de Vendas',launch:'D – Clientes ................. 4.500<br>C – Receita de Vendas ... 4.500',macete:'Não entrou dinheiro agora. Entrou um direito de receber: Clientes aumenta no débito.'},
{icon:'👥',title:'Pagamento de Salários',fact:'Pagamento de salários do mês: R$ 2.200',d:'Despesa de Salários',c:'Caixa',launch:'D – Despesa de Salários ... 2.200<br>C – Caixa ........................ 2.200',macete:'Despesa aumenta no débito. Como saiu dinheiro, Caixa vai para o crédito.'},
{icon:'🏦',title:'Empréstimo Recebido',fact:'Empresa recebeu empréstimo bancário: R$ 10.000',d:'Caixa',c:'Empréstimos a Pagar',launch:'D – Caixa ........................ 10.000<br>C – Empréstimos a Pagar ... 10.000',macete:'Entrou dinheiro, mas também nasceu uma obrigação. Caixa débito; dívida crédito.'},
{icon:'🏢',title:'Integralização de Capital',fact:'Sócio integralizou capital em dinheiro: R$ 20.000',d:'Caixa',c:'Capital Social',launch:'D – Caixa ............... 20.000<br>C – Capital Social ... 20.000',macete:'Entrou dinheiro dos sócios. Caixa aumenta no débito e PL aumenta no crédito.'},
{icon:'🏠',title:'Pagamento de Aluguel',fact:'Pagamento de aluguel: R$ 1.500',d:'Despesa de Aluguel',c:'Caixa',launch:'D – Despesa de Aluguel ... 1.500<br>C – Caixa ....................... 1.500',macete:'Aluguel consumido é despesa. Despesa aumenta no débito; Caixa diminui no crédito.'}
];
let i=0;
function render(){const x=cards[i];document.getElementById('progress').innerHTML=`Figurinha ${i+1} de ${cards.length}`;document.getElementById('sticker').innerHTML=`<div class="badge">#${String(i+1).padStart(2,'0')}</div><div class="icon">${x.icon}</div><div class="title">${x.title}</div><div class="fact">📝 ${x.fact}</div><div class="rule"><div class="box debit"><span>🟢 DÉBITO</span>${x.d}</div><div class="box credit"><span>🔴 CRÉDITO</span>${x.c}</div></div><div class="launch">${x.launch}</div><div class="macete">💡 ${x.macete}</div>`}
function next(){i=(i+1)%cards.length;render()}
function prev(){i=(i-1+cards.length)%cards.length;render()}
function restart(){i=0;render()}
render();
</script>
</body>
</html>

let i = Number(localStorage.getItem('fig_contabil_i')||0);
function render(){const c=cards[i];document.getElementById('tema').innerHTML=c.t;document.getElementById('num').innerHTML=(i+1)+' / '+cards.length;document.getElementById('emoji').innerHTML=c.e;document.getElementById('titulo').innerHTML=c.ti;document.getElementById('fato').innerHTML='<b>Fato:</b> '+c.f;document.getElementById('aumento').innerHTML=c.a;document.getElementById('diminuicao').innerHTML=c.d;document.getElementById('lanc').innerHTML='<b>Lançamento:</b><br>'+c.l;document.getElementById('macete').innerHTML='<b>Macete:</b> '+c.m;document.getElementById('nivel').innerHTML='⭐ Nível: '+c.n;document.getElementById('progresso').style.width=((i+1)/cards.length*100)+'%';localStorage.setItem('fig_contabil_i',i)}
function proximo(){i=(i+1)%cards.length;render()} function voltar(){i=(i-1+cards.length)%cards.length;render()} function reiniciar(){i=0;render()} document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')proximo();if(e.key==='ArrowLeft')voltar()});render();
</script>
